name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Runs the "prepare" lifecycle script too (wxt prepare → .wxt types,
      # needed before typecheck). No secrets required: missing WXT_* env vars
      # just inline as undefined, which is fine for a CI build.
      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm build:firefox

  # E2E (pnpm e2e) is intentionally NOT in CI: headless-extension runs are the
  # flakiest part of the suite and pull a ~100MB browser per run, while the build
  # + typecheck above already cover most of what it would catch. Run it locally
  # before a release.
