name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Runs the "prepare" lifecycle script too (wxt prepare → .wxt types,
      # needed before typecheck). No secrets required: missing WXT_* env vars
      # just inline as undefined, which is fine for a CI build.
      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm build:firefox

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Real Chromium + its system libs, then load the built extension headless.
      - run: pnpm -F @tmsync/extension exec playwright install --with-deps chromium
      - run: pnpm -F @tmsync/extension e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/extension/playwright-report/
          retention-days: 7
